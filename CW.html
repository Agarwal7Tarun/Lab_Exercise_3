<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>ClassWorkWeek7</title>
<style>
	body 
	{
		border: 5px solid black;
	}
</style>
</head>
<body>
<form name = "classwork" action="url" method="get">
		<h4><center>Registration Form</center></h4>
		<table border="1" align="center" bgcolor="#D5CECE">
		<tr>
			<td><b>Enter Your First Name</b></td>
			<td><input type="text" name="fname" placeholder="Enter Your First Name"></td>
		</tr>
		<tr>
			<td><b>Enter Your Last Name</b></td>
			<td><input type="text" name="lname" placeholder="Enter Your Last Name"></td>
		</tr>
		<tr>
			<td><b>Enter Your Password</b></td>
			<td><input type="password" name="pass" placeholder="Enter Your Password"></td>
		</tr>
		<tr>
			<td><b>ReEnter Your Password</b></td>
			<td><input type="password" name="repass" placeholder="Enter Your Password Again"></td>
		</tr>
		<tr>
			<td><b>Enter Your Email</b></td>
			<td><input type="email" name="email" placeholder="Enter Your Email"></td>
		</tr>
		<tr>
			<td><b>Enter Your Mobile Number</b></td>
			<td><input type="tel" name="number" placeholder="Enter Your Mobile Number"></td>
		</tr>
		<tr>
			<td><b>Enter Your Address</b></td>
			<td><textarea name="address" placeholder="Enter Your Address"></textarea></td>
		</tr>
		<tr>
			<td><b>Select your Gender</b></td>
			<td><input type="radio" id="male">Male<br><input type="radio" id="female">Female<br><input type="radio" id="others">Others<br></td>
		</tr>
		<tr>
			<td><b>Select your Hobbies</b></td>
			<td><input type="checkbox" id="hobby1" value="Hobby1">Hobby1<br><input type="checkbox" id="hobby2" value="Hobby2">Hobby2<br><input type="checkbox" id="hobby3" value="Hobby3">Hobby3<br></td>
		</tr>
		<tr>
			<td><b>Select your DOB</b></td>
			<td><input type="date" id="DOB" value="DOB"><br></td>
		</tr>
		<tr>
			<td><b>Select your Country</b></td>
				<td><select name="country" placeholder="Select your Country"><option value="Null">Select Your Country</option><option value="Nepal">Nepal</option><option value="India">India</option><option value="China">China</option></select></td>
		</tr>
		<tr>
			<td><b>Select Image</b></td>
			<td><input type="file" name="image"></td>
		</tr>
		<tr>
			<td rowspan="2">
			<center>
			<input type="Submit" value="Save My Data">
			<input type="Reset" value="Reset Data">
			</center>
			</td>
		</tr>
		</table>
</form>
</body>
</html>
